<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Cockpit MicroShift host deployment workflow</title>
  <desc id="desc">A four-stage workflow showing target selection, validation, artifact review, and installation plus inventory follow-up.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7f7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 12 6 0 12Z" fill="#6a6e73"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="70" y="78" fill="#151515" font-family="Red Hat Display, Red Hat Text, Arial, sans-serif" font-size="34" font-weight="600">MicroShift host-first deployment workflow</text>
  <text x="70" y="112" fill="#4d4d4d" font-family="Red Hat Text, Arial, sans-serif" font-size="20">Choose an existing host or a new local guest, then keep the final install aligned to the documented RPM model.</text>

  <g transform="translate(70 170)">
    <rect width="230" height="220" fill="#ffffff" stroke="#c7c7c7" stroke-width="2"/>
    <rect width="230" height="12" fill="#ee0000"/>
    <text x="20" y="46" fill="#151515" font-family="Red Hat Display, Red Hat Text, Arial, sans-serif" font-size="24" font-weight="600">1. Pick target</text>
    <text x="20" y="84" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">Existing RHEL host</text>
    <text x="20" y="114" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">or local libvirt guest</text>
    <text x="20" y="144" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">static IP plan</text>
    <text x="20" y="174" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">registry auth + SSH</text>
  </g>

  <g transform="translate(350 170)">
    <rect width="230" height="220" fill="#ffffff" stroke="#c7c7c7" stroke-width="2"/>
    <rect width="230" height="12" fill="#ee0000"/>
    <text x="20" y="46" fill="#151515" font-family="Red Hat Display, Red Hat Text, Arial, sans-serif" font-size="24" font-weight="600">2. Validate path</text>
    <text x="20" y="84" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">SSH + sudo checks</text>
    <text x="20" y="114" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">RHSM or repo mode</text>
    <text x="20" y="144" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">libvirt prerequisites</text>
    <text x="20" y="174" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">firewalld intent</text>
  </g>

  <g transform="translate(630 170)">
    <rect width="230" height="220" fill="#ffffff" stroke="#c7c7c7" stroke-width="2"/>
    <rect width="230" height="12" fill="#ee0000"/>
    <text x="20" y="46" fill="#151515" font-family="Red Hat Display, Red Hat Text, Arial, sans-serif" font-size="24" font-weight="600">3. Review artifacts</text>
    <text x="20" y="84" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">config.yaml</text>
    <text x="20" y="114" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">request summary</text>
    <text x="20" y="144" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">cloud-init inputs</text>
    <text x="20" y="174" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">virt-install plan</text>
  </g>

  <g transform="translate(910 170)">
    <rect width="220" height="220" fill="#ffffff" stroke="#c7c7c7" stroke-width="2"/>
    <rect width="220" height="12" fill="#ee0000"/>
    <text x="20" y="46" fill="#151515" font-family="Red Hat Display, Red Hat Text, Arial, sans-serif" font-size="24" font-weight="600">4. Install + return</text>
    <text x="20" y="84" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">RPM install on host</text>
    <text x="20" y="114" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">validate node readiness</text>
    <text x="20" y="144" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">copy kubeconfig back</text>
    <text x="20" y="174" fill="#151515" font-family="Red Hat Text, Arial, sans-serif" font-size="18">inventory + destroy</text>
  </g>

  <path d="M302 280H338" fill="none" stroke="#6a6e73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M582 280H618" fill="none" stroke="#6a6e73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M862 280H898" fill="none" stroke="#6a6e73" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
